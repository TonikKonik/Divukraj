name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write .env.local
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DIVUKRAJ_DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.DIVUKRAJ_AUTH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DB_URL,AUTH_SECRET,ANTHROPIC_API_KEY
          script: |
            printf "DATABASE_URL=%s\nAUTH_SECRET=%s\nANTHROPIC_API_KEY=%s\n" \
              "$DB_URL" "$AUTH_SECRET" "$ANTHROPIC_API_KEY" > /var/www/divukraj/.env.local
            echo env written

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /var/www/divukraj
            git pull origin main
            npm ci
            [ -f prisma/schema.prisma ] && npx prisma generate && (npx prisma migrate deploy 2>/dev/null || npx prisma db push --accept-data-loss) || true
            npm run build
            pm2 delete divukraj 2>/dev/null || true
            pm2 start pm2.config.js && pm2 save
            echo deploy done